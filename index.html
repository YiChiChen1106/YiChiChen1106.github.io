<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YichiChen</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f5ef;
        color: #1f2a2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(247, 245, 239, 0.94), rgba(239, 246, 242, 0.92)),
          url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1600&q=80") center / cover;
      }

      main {
        width: min(720px, 100%);
        padding: clamp(32px, 7vw, 72px);
        border: 1px solid rgba(31, 42, 46, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 80px rgba(28, 39, 44, 0.14);
        backdrop-filter: blur(14px);
      }

      p {
        margin: 0;
        color: #526067;
        line-height: 1.7;
        font-size: clamp(16px, 2vw, 19px);
      }

      h1 {
        margin: 10px 0 18px;
        font-size: clamp(42px, 8vw, 84px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      a {
        color: #176b87;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }

      .eyebrow {
        color: #176b87;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 32px;
      }

      .links a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid rgba(23, 107, 135, 0.26);
        border-radius: 8px;
        background: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111719;
          color: #ecf2ef;
        }

        body {
          background:
            linear-gradient(135deg, rgba(17, 23, 25, 0.86), rgba(20, 35, 36, 0.86)),
            url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1600&q=80") center / cover;
        }

        main {
          border-color: rgba(236, 242, 239, 0.14);
          background: rgba(17, 23, 25, 0.78);
        }

        p {
          color: #bec9ca;
        }

        a,
        .eyebrow {
          color: #72d0e5;
        }

        .links a {
          border-color: rgba(114, 208, 229, 0.28);
          background: rgba(255, 255, 255, 0.08);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">GitHub Pages</p>
      <h1>YichiChen</h1>
      <p>
        A personal site hosted on GitHub Pages, collecting projects, notes, and
        experiments.
      </p>
      <nav class="links" aria-label="Profile links">
        <a href="https://github.com/YiChiChen1106">GitHub Profile</a>
        <a href="https://github.com/YiChiChen1106/Nativehook_linux_planb">Nativehook Linux Plan B</a>
        <a href="https://YiChiChen1106.github.io">Live Site</a>
      </nav>
    </main>
  </body>
</html>
